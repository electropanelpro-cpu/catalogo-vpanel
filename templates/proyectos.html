{% extends 'base.html' %}



{% block content %}



<h1>Proyectos</h1>



<div class="grid">



{% for p in proyectos %}

<div class="card">



    <img src="{{ url_for('static', filename='img/' + p.imagen) }}" 

         class="img-proyecto" 

         style="object-fit: contain; background: #0b1120; width: 100%; height: 200px;">



    <h3>{{ p.titulo }}</h3>

    <p>{{ p.descripcion }}</p>



    <a href="/proyecto/{{p.id}}" class="btn-ver">Ver imagen completa</a>



    <div class="social-bar">

        <button type="button" class="btn-interaction btn-like" onclick="toggleLike(this)">

            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>

            Me gusta

        </button>

        <button type="button" class="btn-interaction" onclick="toggleComentarios('caja-{{p.id}}')">

            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>

            Comentarios

        </button>

    </div>



    <div id="caja-{{p.id}}" class="comentarios-container" style="display: none;">

        

        <div class="comentarios-list" id="lista-{{p.id}}">

            {% for c in p.comentarios %}

                <div class="comentario-item" id="item-{{c.id}}">

                    <div class="comentario-header" style="display: flex; justify-content: space-between; align-items: center;">

                        <strong>{{c.nombre}}:</strong>

                        <div style="position: relative;">

                            <span class="puntos-menu" onclick="toggleMenu('menu-{{c.id}}')" style="font-weight: bold; font-size: 20px; cursor: pointer; color: #00ffcc; padding: 0 8px;">&#8942;</span>

                            <div id="menu-{{c.id}}" class="dropdown-menu" style="display: none; position: absolute; right: 0; background: #1e293b; border: 1px solid #00ffcc; border-radius: 5px; z-index: 100; min-width: 100px;">

                                <button onclick="activarEdicion('{{c.id}}')" style="display: block; width: 100%; padding: 8px; background: none; border: none; color: white; text-align: left; cursor: pointer;">✏️ Editar</button>

                                <button onclick="borrarComentario('{{c.id}}')" style="display: block; width: 100%; padding: 8px; background: none; border: none; color: #ff4757; text-align: left; cursor: pointer; font-size: 13px;">🗑️ Borrar</button>

                            </div>

                        </div>

                    </div>

                    

                    <p id="texto-{{c.id}}" style="margin: 5px 0;">{{c.texto}}</p>

                    

                    <form id="form-edit-{{c.id}}" onsubmit="guardarEdicion(event, '{{c.id}}')" style="display: none; gap: 5px; margin-top: 5px;">

                        <input type="text" name="texto" value="{{c.texto}}" class="input-social" style="flex-grow: 1;" required>

                        <button type="submit" class="btn-send" style="padding: 2px 8px;">Ok</button>

                    </form>

                </div>

            {% else %}

                <p class="comentario-vacio" id="vacio-{{p.id}}">Sin comentarios aún</p>

            {% endfor %}

        </div>



        <form onsubmit="enviarComentario(event, '{{p.id}}')" class="form-social">

            <input type="text" name="nombre" id="nombre-{{p.id}}" placeholder="Tu nombre" required class="input-social">

            <div class="input-group-social">

                <input type="text" name="texto" id="texto-input-{{p.id}}" placeholder="Escribe un comentario..." required class="input-social">

                <button type="submit" class="btn-send">

                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>

                </button>

            </div>

        </form>

    </div>



</div>

{% endfor %}



</div>



<script>

    function toggleComentarios(id) {

        const div = document.getElementById(id);

        div.style.display = (div.style.display === "none") ? "block" : "none";

    }



    function toggleLike(btn) {

        btn.classList.toggle('active-like');

    }



    function toggleMenu(id) {

        const menu = document.getElementById(id);

        menu.style.display = (menu.style.display === "none") ? "block" : "none";

    }



    function activarEdicion(id) {

        document.getElementById('texto-' + id).style.display = 'none';

        document.getElementById('form-edit-' + id).style.display = 'flex';

        document.getElementById('menu-' + id).style.display = 'none';

    }



    async function enviarComentario(event, proyectoId) {

        event.preventDefault();

        const nombre = document.getElementById('nombre-' + proyectoId).value;

        const texto = document.getElementById('texto-input-' + proyectoId).value;

        

        const formData = new FormData();

        formData.append('nombre', nombre);

        formData.append('texto', texto);



        const response = await fetch('/comentar/' + proyectoId, { method: 'POST', body: formData });

        const data = await response.json();



        if (data.success) {

            const lista = document.getElementById('lista-' + proyectoId);

            const vacio = document.getElementById('vacio-' + proyectoId);

            if (vacio) vacio.remove();



            const nuevoHTML = `

                <div class="comentario-item" id="item-${data.id}">

                    <div class="comentario-header" style="display: flex; justify-content: space-between; align-items: center;">

                        <strong>${data.nombre}:</strong>

                        <div style="position: relative;">

                            <span class="puntos-menu" onclick="toggleMenu('menu-${data.id}')" style="font-weight: bold; font-size: 20px; cursor: pointer; color: #00ffcc; padding: 0 8px;">&#8942;</span>

                            <div id="menu-${data.id}" class="dropdown-menu" style="display: none; position: absolute; right: 0; background: #1e293b; border: 1px solid #00ffcc; border-radius: 5px; z-index: 100; min-width: 100px;">

                                <button onclick="activarEdicion('${data.id}')" style="display: block; width: 100%; padding: 8px; background: none; border: none; color: white; text-align: left; cursor: pointer;">✏️ Editar</button>

                                <button onclick="borrarComentario('${data.id}')" style="display: block; width: 100%; padding: 8px; background: none; border: none; color: #ff4757; text-align: left; cursor: pointer; font-size: 13px;">🗑️ Borrar</button>

                            </div>

                        </div>

                    </div>

                    <p id="texto-${data.id}" style="margin: 5px 0;">${data.texto}</p>

                    <form id="form-edit-${data.id}" onsubmit="guardarEdicion(event, '${data.id}')" style="display: none; gap: 5px; margin-top: 5px;">

                        <input type="text" name="texto" value="${data.texto}" class="input-social" style="flex-grow: 1;" required>

                        <button type="submit" class="btn-send" style="padding: 2px 8px;">Ok</button>

                    </form>

                </div>`;

            lista.insertAdjacentHTML('beforeend', nuevoHTML);

            document.getElementById('texto-input-' + proyectoId).value = '';

        }

    }



    async function borrarComentario(id) {

        const response = await fetch('/borrar_comentario/' + id);

        const data = await response.json();

        if (data.success) {

            document.getElementById('item-' + id).remove();

        }

    }



    async function guardarEdicion(event, id) {

        event.preventDefault();

        const nuevoTexto = event.target.texto.value;

        const formData = new FormData();

        formData.append('texto', nuevoTexto);



        const response = await fetch('/editar_comentario/' + id, { method: 'POST', body: formData });

        const data = await response.json();



        if (data.success) {

            document.getElementById('texto-' + id).innerText = data.texto;

            document.getElementById('texto-' + id).style.display = 'block';

            document.getElementById('form-edit-' + id).style.display = 'none';

        }

    }



    window.onclick = function(event) {

        if (!event.target.matches('.puntos-menu')) {

            var dropdowns = document.getElementsByClassName("dropdown-menu");

            for (var i = 0; i < dropdowns.length; i++) {

                dropdowns[i].style.display = "none";

            }

        }

    }

</script>



{% endblock %}
