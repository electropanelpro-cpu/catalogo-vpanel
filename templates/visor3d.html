{% extends 'base.html' %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<div style="display: flex; flex-direction: row; gap: 20px; width: 100%; min-height: 85vh; padding: 25px; box-sizing: border-box; background: #020617;">

    <div class="tech-card" style="flex: 3; margin: 0; position: relative; min-width: 0; border-radius: 20px; overflow: hidden; border: 1px solid #1e293b; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);">
        <div style="position: absolute; top: 20px; left: 20px; z-index: 5; display: flex; flex-direction: column; gap: 5px;">
            <span style="font-family: 'Roboto Mono'; color: #00ffcc; font-size: 0.65rem; letter-spacing: 2px;">// SYSTEM_VIEWER_PRO</span>
            <h1 style="font-size: 1.3rem; margin: 0; color: white; font-weight: 800; text-transform: uppercase; letter-spacing: -0.5px;">{{ proyecto.titulo }}</h1>
        </div>

        <div class="edrawings-toolbar">
            <button onclick="resetCamera()" title="Vista Inicial"><i class="fas fa-home"></i></button>
            <button onclick="zoomIn()" title="Acercar"><i class="fas fa-search-plus"></i></button>
            <button onclick="zoomOut()" title="Alejar"><i class="fas fa-search-minus"></i></button>
            
            <div class="view-dropdown">
                <button title="Vistas Estándar"><i class="fas fa-video"></i> <i class="fas fa-caret-down" style="font-size: 0.6rem;"></i></button>
                <div class="dropdown-content">
                    <a href="javascript:void(0)" onclick="setView('0deg 90deg auto')">Vista Frontal</a>
                    <a href="javascript:void(0)" onclick="setView('90deg 90deg auto')">Vista Lateral</a>
                    <a href="javascript:void(0)" onclick="setView('0deg 0deg auto')">Vista Superior</a>
                    <a href="javascript:void(0)" onclick="setView('45deg 45deg auto')">Vista Isométrica</a>
                </div>
            </div>

            <div style="width: 1px; background: rgba(255,255,255,0.1); margin: 8px 5px; height: 20px;"></div> 
            <button onclick="toggleFullscreen()" title="Pantalla Completa"><i class="fas fa-expand-arrows-alt"></i></button>
        </div>

        <model-viewer
            id="visor-pro"
            src="{{ url_for('static', filename='models/' ~ proyecto.imagen.replace('.jpg', '.glb')) }}"
            alt="Modelo 3D V-Panel"
            camera-controls
            interaction-prompt="none"
            exposure="1.2"
            shadow-intensity="2"
            environment-image="neutral"
            style="width:100%; height:700px; touch-action: none; background: radial-gradient(circle, #0f172a 0%, #020617 100%);">
            
            <div slot="poster" style="display: flex; align-items: center; justify-content: center; height: 100%; width: 100%; background: #020617; color: #00ffcc; font-family: 'Roboto Mono'; font-size: 0.7rem;">
                <div style="text-align: center;">
                    <div class="custom-spinner"></div>
                    <br>INICIALIZANDO RENDER...
                </div>
            </div>
        </model-viewer>
    </div>

    <div class="tech-card" style="flex: 1; margin: 0; min-width: 320px; display: flex; flex-direction: column; border-radius: 20px; border: 1px solid #1e293b;">
        <div style="padding: 25px; border-bottom: 1px solid #1e293b;">
            <h3 style="color: #00ffcc; font-size: 0.75rem; font-weight: 800; margin: 0; text-transform: uppercase; font-family: 'Roboto Mono'; letter-spacing: 2px;">
                <i class="fas fa-microchip" style="margin-right: 8px;"></i> Lista de Componentes
            </h3>
        </div>
        
        <div id="lista-piezas" class="custom-scrollbar" style="flex-grow: 1; overflow-y: auto; max-height: 620px; padding: 20px;">
            <p style="font-size: 0.8rem; color: #48566a; text-align: center; margin-top: 40px; font-family: 'Roboto Mono'; uppercase">Escaneando geometría...</p>
        </div>

        <div style="padding: 20px; background: rgba(0, 255, 204, 0.03); border-top: 1px solid #1e293b; border-radius: 0 0 20px 20px;">
            <p style="font-size: 0.65rem; color: #48566a; margin: 0; font-family: 'Roboto Mono'; text-align: center;">
                Click izquierdo: Seleccionar<br>Click derecho: Acciones
            </p>
        </div>
    </div>
</div>

<div id="menu-contextual-3d" style="display: none; position: fixed; background: #0b1120; border: 1px solid #00ffcc; border-radius: 12px; z-index: 9999; min-width: 200px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); backdrop-filter: blur(15px);">
    <button onclick="ejecutarAccion3D('toggle')" style="width: 100%; padding: 15px; background: none; border: none; color: white; text-align: left; cursor: pointer; border-bottom: 1px solid #1e293b; font-size: 0.8rem; font-weight: 600;">
        <i class="fas fa-eye-slash" style="color: #00ffcc; width: 20px;"></i> Mostrar / Ocultar
    </button>
    <button onclick="ejecutarAccion3D('fade')" style="width: 100%; padding: 15px; background: none; border: none; color: white; text-align: left; cursor: pointer; font-size: 0.8rem; font-weight: 600;">
        <i class="fas fa-ghost" style="color: #00ffcc; width: 20px;"></i> Modo Transparencia
    </button>
</div>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<script type="module">
    // Mantenemos tu lógica de JS intacta tal como pediste
    const modelViewer = document.querySelector("#visor-pro");
    const listaPiezas = document.querySelector("#lista-piezas");
    const menu = document.querySelector("#menu-contextual-3d");
    let piezaActualIndex = null;

    const bibliotecaModelos = {
        'tablero2': { 'color': 'Gabinete Principal', 'color.001': 'Panel de Montaje', 'color.13': 'Interruptor Termomagnético', 'color-4.007': 'Riel DIN' },
        'tablero1': { 'color.064': 'Estructura TDF', 'color-30.017': 'Puerta Frontal', 'color-30.016': 'Barra de Cobre' }
    };

    modelViewer.addEventListener('load', () => {
        listaPiezas.innerHTML = "";
        const srcLower = modelViewer.src.toLowerCase();
        let proyectoKey = srcLower.includes("tablero2") ? "tablero2" : (srcLower.includes("tablero1") ? "tablero1" : "");
        const nombresActuales = bibliotecaModelos[proyectoKey] || {};

        if (modelViewer.model && modelViewer.model.materials) {
            modelViewer.model.materials.forEach((material, index) => {
                const nombreMostrar = nombresActuales[material.name] || material.name || `Componente_${index + 1}`;
                const div = document.createElement("div");
                div.className = "item-pieza-3d";
                div.id = `item-lista-${index}`;
                div.innerHTML = `<span style="font-weight: 600;">${nombreMostrar}</span> <span id="status-${index}" style="font-size: 0.6rem;">🟢</span>`;
                div.onclick = (e) => { e.stopPropagation(); window.resaltarPieza(index); };
                div.oncontextmenu = (e) => { e.preventDefault(); e.stopPropagation(); window.abrirMenu(e, index); };
                listaPiezas.appendChild(div);
            });
        }
    });

    // ... Resto de tus funciones window (resaltarPieza, abrirMenu, etc) sin cambios
    window.resaltarPieza = (index) => {
        piezaActualIndex = (piezaActualIndex === index) ? null : index;
        modelViewer.model.materials.forEach((mat, i) => {
            mat.setEmissiveFactor(i === piezaActualIndex ? [0, 0.4, 0.4] : [0, 0, 0]);
        });
        document.querySelectorAll('.item-pieza-3d').forEach((el, i) => {
            if (i === piezaActualIndex) {
                el.classList.add('active-item');
                el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } else {
                el.classList.remove('active-item');
            }
        });
    };

    window.abrirMenu = (e, index) => {
        piezaActualIndex = index;
        menu.style.display = "block";
        menu.style.left = e.clientX + "px";
        menu.style.top = e.clientY + "px";
    };

    window.ejecutarAccion3D = (tipo) => {
        if (piezaActualIndex === null) return;
        const mat = modelViewer.model.materials[piezaActualIndex];
        const color = mat.pbrMetallicRoughness.baseColorFactor;
        if (tipo === 'toggle') {
            const isHidden = color[3] === 0;
            mat.pbrMetallicRoughness.setBaseColorFactor([color[0], color[1], color[2], isHidden ? 1 : 0]);
            mat.setAlphaMode(isHidden ? 'OPAQUE' : 'BLEND');
            document.getElementById(`status-${piezaActualIndex}`).innerText = isHidden ? "🟢" : "🔴";
        } else if (tipo === 'fade') {
            const alpha = color[3] < 1 ? 1 : 0.3;
            mat.pbrMetallicRoughness.setBaseColorFactor([color[0], color[1], color[2], alpha]);
            mat.setAlphaMode(alpha < 1 ? 'BLEND' : 'OPAQUE');
            document.getElementById(`status-${piezaActualIndex}`).innerText = alpha < 1 ? "🟡" : "🟢";
        }
        menu.style.display = "none";
    };

    window.resetCamera = () => { modelViewer.cameraOrbit = '0deg 75deg auto'; modelViewer.fieldOfView = 'auto'; };
    window.setView = (orbit) => { modelViewer.cameraOrbit = orbit; };
    window.zoomIn = () => { const fov = parseFloat(modelViewer.fieldOfView) || 45; modelViewer.fieldOfView = `${Math.max(10, fov - 8)}deg`; };
    window.zoomOut = () => { const fov = parseFloat(modelViewer.fieldOfView) || 45; modelViewer.fieldOfView = `${Math.min(80, fov + 8)}deg`; };
    window.toggleFullscreen = () => { if (!document.fullscreenElement) modelViewer.requestFullscreen(); else document.exitFullscreen(); };
    window.addEventListener('click', () => menu.style.display = "none");
</script>

<style>
    .tech-card { 
        background: #0b1120; 
        transition: 0.3s;
    }
    
    /* TOOLBAR ESTILO DARK */
    .edrawings-toolbar {
        position: absolute; top: 20px; right: 20px;
        display: flex; align-items: center; background: rgba(30, 41, 59, 0.8);
        backdrop-filter: blur(10px);
        padding: 6px; border-radius: 12px; z-index: 1000;
        border: 1px solid rgba(255,255,255,0.05);
    }
    .edrawings-toolbar button { background: transparent; border: none; color: #f8fafc; padding: 10px 14px; cursor: pointer; font-size: 0.9rem; border-radius: 8px; transition: 0.2s; }
    .edrawings-toolbar button:hover { background: #00ffcc; color: #020617; }

    /* DROPDOWN VISTAS */
    .view-dropdown:hover .dropdown-content { display: block; }
    .dropdown-content { 
        display: none; position: absolute; right: 0; top: 100%; 
        background: #1e293b; min-width: 180px; border-radius: 10px; 
        box-shadow: 0 20px 25px rgba(0,0,0,0.4); border: 1px solid #334155; 
        overflow: hidden; margin-top: 8px;
    }
    .dropdown-content a { color: #f8fafc; padding: 12px 16px; text-decoration: none; display: block; font-size: 0.8rem; border-bottom: 1px solid #334155; transition: 0.2s; }
    .dropdown-content a:hover { background: rgba(0, 255, 204, 0.1); color: #00ffcc; }

    /* LISTA DE PIEZAS */
    .item-pieza-3d { 
        background: rgba(30, 41, 59, 0.4); padding: 15px; margin-bottom: 8px; 
        border-radius: 12px; cursor: pointer; color: #94a3b8; font-size: 0.75rem; 
        display: flex; justify-content: space-between; border: 1px solid transparent; 
        transition: 0.3s; font-family: 'Inter', sans-serif;
    }
    .item-pieza-3d:hover { background: rgba(30, 41, 59, 0.8); border-color: #334155; color: white; }
    .active-item { border-color: #00ffcc !important; background: rgba(0, 255, 204, 0.05) !important; color: white !important; }

    /* SPINNER & SCROLLBAR */
    .custom-spinner { width: 30px; height: 30px; border: 3px solid rgba(0,255,204,0.1); border-top-color: #00ffcc; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #00ffcc; }
</style>
{% endblock %}
